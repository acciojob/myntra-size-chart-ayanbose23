<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

 <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        thead {
            background-color: #333;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        h2 {
            text-align: center;
        }
    </style>
	
 <table>
        <!-- Header Row -->
        <thead>
            <tr>
                <th>Size</th>
                <th>Chest (in)</th>
                <th>Waist (in)</th>
                <th>Hip (in)</th>
            </tr>
        </thead>

        <!-- Data Rows -->
        <tbody>
            <tr>
                <td>S</td>
                <td>36-38</td>
                <td>30-32</td>
                <td>36-38</td>
            </tr>
            <tr>
                <td>M</td>
                <td>38-40</td>
                <td>32-34</td>
                <td>38-40</td>
            </tr>
            <tr>
                <td>L</td>
                <td>40-42</td>
                <td>34-36</td>
                <td>40-42</td>
            </tr>
            <tr>
                <td>XL</td>
                <td>42-44</td>
                <td>36-38</td>
                <td>42-44</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
